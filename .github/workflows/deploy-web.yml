name: Deploy web/ to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build (GitHub Pages with /kredyt-ai/web/ base)
        env:
          # Repo: jakatora/kredyt-ai → URL: https://jakatora.github.io/kredyt-ai/web/
          # SPA mieszka pod /kredyt-ai/web/. Vite musi znać base path żeby asset paths były correct.
          VITE_BASE_PATH: /kredyt-ai/web/
          VITE_API_BASE_URL: https://backend-kredyt-ai-production.up.railway.app
        run: npm run build

      - name: SPA 404 fallback (React Router)
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
