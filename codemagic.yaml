workflows:
  # ===== ANDROID — Play Store AAB =====
  android-build:
    name: KredytAI Android Build
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      vars:
        PACKAGE_NAME: "pl.kredytai.app"
        GOOGLE_PLAY_TRACK: "internal"
      node: 20
      java: 17
    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - $HOME/.npm
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "main"
          include: true
    scripts:
      - name: Install mobile deps
        script: |
          cd mobile
          npm ci --no-audit --no-fund
      - name: Expo prebuild Android
        script: |
          cd mobile
          npx expo prebuild --platform android --clean --no-install
      - name: Setup keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > $CM_BUILD_DIR/mobile/android/app/upload-keystore.jks
          cat > $CM_BUILD_DIR/mobile/android/key.properties <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF
      - name: Gradle build AAB
        script: |
          cd mobile/android
          ./gradlew bundleRelease --no-daemon
    artifacts:
      - mobile/android/app/build/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - jakatora68@gmail.com

  # ===== iOS — App Store + TestFlight =====
  ios-build:
    name: KredytAI iOS — TestFlight
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      # Nazwa integration utworzonej w Codemagic Teams → Personal → Integrations → App Store Connect.
      # Jeśli nazwałeś ją inaczej niż "codemagic" — podmień tutaj.
      app_store_connect: codemagic
    environment:
      # UWAGA: NIE używamy environment.ios_signing — kolidowałby z pre-validation
      # (Codemagic szukałby istniejących profili PRZED odpaleniem skryptów).
      # Zamiast tego: `app-store-connect fetch-signing-files --create` w stepach poniżej
      # auto-tworzy Distribution cert + provisioning profile w runtime.
      vars:
        BUNDLE_ID: "pl.kredytai.app"
        XCODE_WORKSPACE: "mobile/ios/KredytAI.xcworkspace"
        XCODE_SCHEME: "KredytAI"
        # Wpisz Apple ID aplikacji z App Store Connect (numer ~10 cyfr po utworzeniu New App)
        APP_STORE_APPLE_ID: $APP_STORE_APPLE_ID
      node: 20
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "main"
          include: true
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $HOME/.npm
        - $CM_BUILD_DIR/mobile/node_modules
    scripts:
      - name: Install mobile deps
        script: |
          cd mobile
          npm ci --no-audit --no-fund

      - name: Expo prebuild iOS
        script: |
          cd mobile
          npx expo prebuild --platform ios --clean --no-install

      - name: Update CocoaPods to latest
        script: |
          sudo gem install cocoapods --no-document
          pod --version

      - name: Pod install
        script: |
          cd mobile/ios
          pod install --repo-update

      - name: Initialize keychain
        script: keychain initialize

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Apply signing settings to Xcode project
        script: xcode-project use-profiles

      - name: Bump build number (latest TestFlight + 1)
        script: |
          cd $CM_BUILD_DIR/mobile/ios
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" || echo "0")
          LATEST_TESTFLIGHT_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" || echo "0")
          BUILD_NUMBER=$(( ${LATEST_BUILD_NUMBER:-0} > ${LATEST_TESTFLIGHT_BUILD_NUMBER:-0} ? ${LATEST_BUILD_NUMBER:-0} : ${LATEST_TESTFLIGHT_BUILD_NUMBER:-0} ))
          NEW_BUILD=$(( BUILD_NUMBER + 1 ))
          echo "Bumping build number → $NEW_BUILD"
          agvtool new-version -all $NEW_BUILD

      - name: Build IPA
        script: |
          cd mobile/ios
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/mobile/ios/KredytAI.xcworkspace" \
            --scheme "KredytAI" \
            --archive-flags "-destination 'generic/platform=iOS'"

    artifacts:
      - mobile/ios/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - mobile/ios/build/ios/archive/*.xcarchive
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        # TestFlight: upload + internal testers
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
        # Submit to App Store dopiero gdy zaakceptujesz TestFlight build — zostaw false na start
        submit_to_app_store: false
      email:
        recipients:
          - jakatora68@gmail.com
        notify:
          success: true
          failure: true
